<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #F7F5F0; --surface: #FFFFFF; --surface2: #F2EFE8;
  --border: #E0DCD3; --text: #1A1916; --muted: #6B6860; --hint: #9E9C97;
  --accent: #2A6F4E; --accent-light: #E1F5EE;
  --accent2: #B85C2A; --accent2-light: #FAECE7;
}
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

.header {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 1.5rem 1.5rem 1.25rem; position: sticky; top: 0; z-index: 10;
}
.header h1 { font-family: 'DM Serif Display', serif; font-size: 1.6rem; color: var(--text); letter-spacing: -0.02em; }
.header p { font-size: 0.8rem; color: var(--muted); margin-top: 4px; }

.main { max-width: 600px; margin: 0 auto; padding: 1.5rem 1.25rem 4rem; }

.section-title {
  font-size: 10px; font-weight: 500; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--hint);
  margin: 1.75rem 0 0.75rem;
  display: flex; align-items: center; gap: 8px;
}
.section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.section-title:first-child { margin-top: 0; }

.card-list { display: flex; flex-direction: column; gap: 10px; }

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 16px;
  text-decoration: none;
  display: flex; align-items: center; gap: 12px;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.card:hover { border-color: var(--accent); box-shadow: 0 2px 8px rgba(42,111,78,0.08); }
.card:active { background: var(--accent-light); }

.card-icon {
  width: 40px; height: 40px; border-radius: 10px;
  background: var(--accent-light); color: var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
}
.card-icon.orange { background: var(--accent2-light); color: var(--accent2); }
.card-icon.blue { background: #E6F1FB; color: #1A5FA8; }

.card-body { flex: 1; min-width: 0; }
.card-title {
  font-family: 'DM Serif Display', serif;
  font-size: 1rem; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin-bottom: 2px;
}
.card-sub { font-size: 12px; color: var(--muted); }

.card-arrow { color: var(--hint); font-size: 18px; flex-shrink: 0; }

.empty {
  text-align: center; padding: 3rem 1rem;
  color: var(--hint); font-size: 14px; line-height: 1.8;
}
</style>
</head>
<body>

      </div>

  </div>

  <div class="section-title">フレーズ・会話表現</div>
  <div class="card-list">

  <div class="section-title">印刷用</div>

  </div>

</main>
</body>
</html>
