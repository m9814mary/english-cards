<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英語学習カード</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #F7F5F0; --surface: #FFFFFF; --surface2: #F2EFE8;
  --border: #E0DCD3; --text: #1A1916; --muted: #6B6860; --hint: #9E9C97;
  --accent: #2A6F4E; --accent-light: #E1F5EE;
  --accent2: #B85C2A; --accent2-light: #FAECE7;
  --blue: #1A5FA8; --blue-light: #E6F1FB;
}
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
.header {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 1.5rem 1.5rem 1.25rem; position: sticky; top: 0; z-index: 10;
}
.header h1 { font-family: 'DM Serif Display', serif; font-size: 1.6rem; color: var(--text); letter-spacing: -0.02em; }
.header p { font-size: 0.8rem; color: var(--muted); margin-top: 4px; }
.main { max-width: 600px; margin: 0 auto; padding: 1.5rem 1.25rem 4rem; }
.section-title {
  font-size: 10px; font-weight: 500; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--hint);
  margin: 1.75rem 0 0.75rem;
  display: flex; align-items: center; gap: 8px;
}
.section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.card-list { display: flex; flex-direction: column; gap: 10px; }
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 14px 16px;
  text-decoration: none; display: flex; align-items: center; gap: 12px;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.card:hover { border-color: var(--accent); box-shadow: 0 2px 8px rgba(42,111,78,0.08); }
.card:active { background: var(--accent-light); }
.card-icon {
  width: 40px; height: 40px; border-radius: 10px;
  background: var(--accent-light); color: var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
}
.card-icon.orange { background: var(--accent2-light); color: var(--accent2); }
.card-icon.blue { background: var(--blue-light); color: var(--blue); }
.card-body { flex: 1; min-width: 0; }
.card-title {
  font-family: 'DM Serif Display', serif; font-size: 1rem; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px;
}
.card-sub { font-size: 12px; color: var(--muted); }
.card-arrow { color: var(--hint); font-size: 18px; flex-shrink: 0; }
.loading { text-align: center; padding: 3rem 1rem; color: var(--hint); font-size: 14px; line-height: 1.8; }
</style>
</head>
<body>

<header class="header">
  <h1>英語学習カード</h1>
  <p>単語・フレーズ・会話表現 — 音声付き</p>
</header>

<main class="main">
  <div class="section-title">すべてのカード</div>
  <div class="card-list" id="cardList">
    <div class="loading">読み込み中...</div>
  </div>
</main>

<script>
const GITHUB_USER = 'm9814mary';
const GITHUB_REPO = 'english-cards';

function getDisplayName(filename) {
  let name = filename.replace('.html', '');
  if (name.startsWith('vocab_')) name = name.replace('vocab_', '');
  name = name.replace(/_/g, ' / ');
  // 長すぎる場合は短縮
  if (name.length > 50) name = name.substring(0, 50) + '...';
  return name;
}

function getCardStyle(filename) {
  if (filename.includes('PRINT') || filename.includes('print')) {
    return { icon: '🖨️', cls: 'blue', sub: '印刷用 · PDF保存対応' };
  }
  if (filename.includes('phrase') || filename.includes('expression') || filename.includes('english')) {
    return { icon: '💬', cls: 'orange', sub: '会話表現 · 音声付き' };
  }
  return { icon: '📖', cls: '', sub: '単語カード · 音声付き' };
}

async function loadFiles() {
  const cardList = document.getElementById('cardList');
  try {
    const res = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/`);
    const files = await res.json();

    const htmlFiles = files
      .filter(f => f.name.endsWith('.html') && f.name !== 'index.html')
      .sort((a, b) => b.name.localeCompare(a.name));

    if (htmlFiles.length === 0) {
      cardList.innerHTML = '<div class="loading">カードがまだありません</div>';
      return;
    }

    cardList.innerHTML = '';
    htmlFiles.forEach(file => {
      const s = getCardStyle(file.name);
      const card = document.createElement('a');
      card.className = 'card';
      card.href = file.name;
      card.innerHTML = `
        <div class="card-icon ${s.cls}">${s.icon}</div>
        <div class="card-body">
          <div class="card-title">${getDisplayName(file.name)}</div>
          <div class="card-sub">${s.sub}</div>
        </div>
        <div class="card-arrow">›</div>
      `;
      cardList.appendChild(card);
    });
  } catch (e) {
    cardList.innerHTML = '<div class="loading">読み込みに失敗しました。<br>ページを更新してください。</div>';
  }
}

loadFiles();
</script>
</body>
</html>
