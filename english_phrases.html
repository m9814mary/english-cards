<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Phrase Diary</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F5F0;
    --bg2: #EFECE5;
    --bg3: #E5E1D8;
    --ink: #1A1814;
    --ink2: #4A4640;
    --ink3: #7A7570;
    --accent: #C8602A;
    --accent2: #8B3A1C;
    --gold: #B8942A;
    --border: #D8D3C8;
    --card: #FDFCF9;
    --tag-casual: #2A6B4A;
    --tag-formal: #2A4A8B;
    --tag-textbook: #6B4A2A;
    --tag-native: #C8602A;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
  }

  /* HEADER */
  .site-header {
    background: var(--ink);
    color: var(--bg);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 3px solid var(--accent);
  }
  .site-header .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 1.25rem;
    letter-spacing: 0.04em;
    color: var(--bg);
  }
  .site-header .logo span { color: var(--accent); }
  .date-badge {
    font-size: 0.75rem;
    color: var(--ink3);
    background: #2A2825;
    padding: 4px 10px;
    border-radius: 20px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* TODAY'S NOTE */
  .today-note {
    background: var(--ink);
    color: var(--bg);
    padding: 1.25rem 2rem;
    border-bottom: 1px solid #333;
    display: flex;
    gap: 1rem;
    align-items: flex-start;
  }
  .today-note .note-label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--accent);
    font-weight: 600;
    white-space: nowrap;
    padding-top: 2px;
  }
  .today-note .note-text {
    font-size: 0.875rem;
    line-height: 1.6;
    color: #C8C4BE;
    font-style: italic;
  }
  .today-note .note-en {
    font-size: 0.8rem;
    color: #888480;
    margin-top: 4px;
  }

  /* SPEED SELECTOR */
  .controls-bar {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 0.6rem 2rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }
  .controls-bar label {
    font-size: 0.75rem;
    color: var(--ink3);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .speed-group { display: flex; gap: 4px; }
  .speed-btn {
    background: none;
    border: 1px solid var(--border);
    padding: 4px 12px;
    border-radius: 20px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.75rem;
    cursor: pointer;
    color: var(--ink2);
    transition: all 0.15s;
  }
  .speed-btn:hover { border-color: var(--accent); color: var(--accent); }
  .speed-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

  /* TAB NAVIGATION */
  .tab-nav-wrapper {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 0 1.5rem;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tab-nav-wrapper::-webkit-scrollbar { display: none; }
  .tab-nav {
    display: flex;
    gap: 0;
    min-width: max-content;
  }
  .tab-btn {
    background: none;
    border: none;
    padding: 1rem 1.25rem;
    font-family: 'DM Serif Display', serif;
    font-size: 0.9rem;
    cursor: pointer;
    color: var(--ink3);
    border-bottom: 3px solid transparent;
    transition: all 0.2s;
    white-space: nowrap;
    position: relative;
  }
  .tab-btn:hover { color: var(--ink); }
  .tab-btn.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }
  .tab-btn .tab-num {
    display: block;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.6rem;
    color: var(--ink3);
    font-weight: 500;
    margin-bottom: 2px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .tab-btn.active .tab-num { color: var(--accent2); }

  /* MAIN CONTENT */
  .main { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

  .phrase-panel { display: none; animation: fadeIn 0.3s ease; }
  .phrase-panel.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  /* PHRASE HERO */
  .phrase-hero {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 2rem 2rem 1.5rem;
    margin-bottom: 1.5rem;
    position: relative;
    overflow: hidden;
  }
  .phrase-hero::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--accent), var(--gold));
  }
  .phrase-hero h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 2.2rem;
    color: var(--ink);
    margin-bottom: 0.5rem;
    letter-spacing: -0.01em;
  }
  .phrase-hero h1 .phrase-num {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.7rem;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    display: block;
    margin-bottom: 0.35rem;
  }
  .phrase-meaning-short {
    font-size: 0.95rem;
    color: var(--ink2);
    line-height: 1.6;
  }

  /* SECTION CARDS */
  .section-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 1.25rem;
    overflow: hidden;
  }
  .section-header {
    background: var(--bg2);
    padding: 0.875rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .section-header h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 1rem;
    color: var(--ink);
  }
  .section-icon { font-size: 1.1rem; }
  .section-body { padding: 1.5rem; }

  /* NUANCE BOX */
  .nuance-box {
    background: var(--bg2);
    border-left: 4px solid var(--accent);
    border-radius: 0 8px 8px 0;
    padding: 1rem 1.25rem;
    margin-bottom: 1rem;
    font-size: 0.9rem;
    line-height: 1.7;
    color: var(--ink2);
  }
  .nuance-box strong { color: var(--ink); }

  /* PATTERN LIST */
  .pattern-item {
    padding: 1rem 0;
    border-bottom: 1px solid var(--bg3);
  }
  .pattern-item:last-child { border-bottom: none; padding-bottom: 0; }
  .pattern-en {
    font-family: 'DM Serif Display', serif;
    font-size: 1.05rem;
    color: var(--ink);
    margin-bottom: 0.3rem;
  }
  .pattern-en .blank {
    color: var(--accent);
    border-bottom: 2px solid var(--accent);
    padding: 0 2px;
  }
  .pattern-ja {
    font-size: 0.8rem;
    color: var(--ink3);
    margin-bottom: 0.4rem;
  }
  .pattern-note {
    font-size: 0.8rem;
    color: var(--ink2);
    background: var(--bg2);
    padding: 4px 10px;
    border-radius: 4px;
    display: inline-block;
  }

  /* EXAMPLE SENTENCE */
  .example-item {
    padding: 1.1rem 0;
    border-bottom: 1px dashed var(--bg3);
  }
  .example-item:last-child { border-bottom: none; padding-bottom: 0; }
  .example-row {
    display: flex;
    align-items: flex-start;
    gap: 0.75rem;
  }
  .example-en {
    font-size: 0.92rem;
    line-height: 1.65;
    color: var(--ink);
    flex: 1;
  }
  .example-en strong { color: var(--accent2); font-weight: 600; }
  .example-ja {
    font-size: 0.8rem;
    color: var(--ink3);
    margin-top: 0.35rem;
    line-height: 1.55;
  }
  .speak-btn {
    background: none;
    border: 1.5px solid var(--border);
    border-radius: 50%;
    width: 32px; height: 32px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.85rem;
    flex-shrink: 0;
    transition: all 0.15s;
    color: var(--ink3);
    margin-top: 2px;
  }
  .speak-btn:hover { border-color: var(--accent); color: var(--accent); background: #FFF5F0; }
  .speak-btn.playing { border-color: var(--accent); color: var(--accent); animation: pulse 0.6s infinite alternate; }
  @keyframes pulse { from { opacity: 1; } to { opacity: 0.4; } }

  /* TAGS */
  .alt-item {
    padding: 1.1rem 0;
    border-bottom: 1px dashed var(--bg3);
  }
  .alt-item:last-child { border-bottom: none; }
  .alt-phrase {
    font-family: 'DM Serif Display', serif;
    font-size: 1.1rem;
    margin-bottom: 0.5rem;
  }
  .tag-row { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 0.5rem; }
  .tag {
    font-size: 0.7rem;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 12px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .tag-casual { background: #E8F4EE; color: var(--tag-casual); }
  .tag-formal { background: #E8EEF4; color: var(--tag-formal); }
  .tag-textbook { background: #F4EEE8; color: var(--tag-textbook); }
  .tag-native { background: #FEF0E8; color: var(--tag-native); }
  .alt-diff {
    font-size: 0.82rem;
    color: var(--ink2);
    line-height: 1.6;
    padding-left: 0.5rem;
    border-left: 3px solid var(--bg3);
    margin-top: 0.5rem;
  }
  .pin { color: var(--accent); font-weight: 600; }
  .alt-example {
    margin-top: 0.6rem;
    background: var(--bg2);
    border-radius: 6px;
    padding: 0.6rem 0.75rem;
    display: flex;
    align-items: flex-start;
    gap: 0.6rem;
  }
  .alt-example-text { flex: 1; }
  .alt-example-en {
    font-size: 0.85rem;
    color: var(--ink);
    line-height: 1.6;
  }
  .alt-example-en strong { color: var(--accent2); font-weight: 600; }
  .alt-example-ja {
    font-size: 0.75rem;
    color: var(--ink3);
    margin-top: 0.2rem;
    line-height: 1.5;
  }

  /* TIP BOX */
  .tip-box {
    background: linear-gradient(135deg, #FFFAF5, #FFF5EC);
    border: 1px solid #F0D8C0;
    border-radius: 8px;
    padding: 1.25rem;
    font-size: 0.875rem;
    line-height: 1.75;
    color: var(--ink2);
  }
  .tip-box h3 {
    font-family: 'DM Serif Display', serif;
    font-size: 0.95rem;
    color: var(--accent2);
    margin-bottom: 0.6rem;
  }
  .tip-item { margin-bottom: 0.5rem; padding-left: 1rem; position: relative; }
  .tip-item::before { content: '›'; position: absolute; left: 0; color: var(--accent); font-weight: bold; }

  /* PATTERN HEADER */
  .pattern-label {
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--ink3);
    margin-bottom: 0.75rem;
    padding-bottom: 0.4rem;
    border-bottom: 1px solid var(--bg3);
  }

  /* DIVIDER */
  .mini-divider {
    height: 1px;
    background: linear-gradient(90deg, var(--border), transparent);
    margin: 1rem 0;
  }

  /* SCROLL PROGRESS */
  .progress-bar {
    position: fixed;
    top: 64px;
    left: 0;
    height: 2px;
    background: var(--accent);
    transition: width 0.1s;
    z-index: 99;
  }

  @media (max-width: 600px) {
    .site-header { padding: 0 1rem; }
    .today-note { padding: 1rem; }
    .controls-bar { padding: 0.6rem 1rem; }
    .tab-nav-wrapper { padding: 0 0.75rem; }
    .main { padding: 1.25rem 1rem 3rem; }
    .phrase-hero { padding: 1.5rem 1.25rem 1.25rem; }
    .phrase-hero h1 { font-size: 1.75rem; }
    .section-body { padding: 1.1rem; }
  }
</style>
</head>
<body>

<div class="progress-bar" id="progressBar"></div>

<header class="site-header">
  <div class="logo">English <span>Phrase</span> Diary</div>
  <div class="date-badge">2025 · May · 11</div>
</header>

<div class="today-note">
  <div class="note-label">📓 Today's Note</div>
  <div>
    <div class="note-text">今日は割と早く起きられたけど、英語の勉強もプログラミングもジムも全部できなかった。まあ、そういう日もある。</div>
    <div class="note-en">Woke up pretty early today — but had no time to study English, no time to code, and couldn't make it to the gym either. Well, at least I made it through the day.</div>
  </div>
</div>

<div class="controls-bar">
  <label>🔊 Speed</label>
  <div class="speed-group">
    <button class="speed-btn" data-rate="0.7" onclick="setSpeed(0.7, this)">遅め</button>
    <button class="speed-btn active" data-rate="1.0" onclick="setSpeed(1.0, this)">普通</button>
    <button class="speed-btn" data-rate="1.25" onclick="setSpeed(1.25, this)">速め</button>
  </div>
</div>

<div class="tab-nav-wrapper">
  <nav class="tab-nav" id="tabNav"></nav>
</div>

<main class="main" id="main"></main>

<script>
const phrases = [
  {
    id: 1,
    phrase: "have nothing to do with ~",
    short: "〜と全く関係ない・〜とは無関係だ",
    panels: [
      {
        title: "意味・ニュアンス",
        icon: "📖",
        content: `
          <div class="nuance-box">
            <strong>「〜とは一切関係ない」</strong>という強い否定・切り離し。単なる「関係ない」ではなく、
            <strong>「そもそも関わりがない」「結びつきがゼロ」</strong>というニュアンス。<br><br>
            怒りや防衛のトーンを含むことも多く、<em>「俺には関係ない話だ」「巻き込まないでくれ」</em>という場面でよく使われる。
            逆に客観的に「Aの原因はBとは無関係だ」と説明するときにも使える。
          </div>
        `
      },
      {
        title: "よく使うパターン",
        icon: "🔧",
        content: `
          <div class="pattern-label">構文バリエーション</div>
          ${pat("A has nothing to do with B", "A と B は全く無関係だ", "原因・理由を否定するとき")}
          ${pat("It has nothing to do with you.", "あなたには関係ない話だ", "相手を切り離すとき（やや強め）")}
          ${pat("This injury has nothing to do with last week's match.", "この怪我は先週の試合とは無関係だ", "スポーツ文脈での用例")}
          ${pat("His comeback has nothing to do with money.", "彼の復帰はお金とは関係ない", "動機・理由を否定するとき")}
        `
      },
      {
        title: "会話例・日記文",
        icon: "✍️",
        content: `
          ${ex("His late-game decision <strong>had nothing to do with</strong> tactics — it was pure instinct.", "後半の彼の判断は戦術とは無関係だった。純粋な本能だよ。")}
          ${ex("I don't understand why people say Kendrick's beef <strong>has nothing to do with</strong> the music. It IS the music.", "ケンドリックのビーフは音楽と関係ないって言う人がいるけど、それ自体が音楽だろって思う。")}
          ${ex("My slump in the morning <strong>has nothing to do with</strong> not going to the gym — I just need a better routine.", "朝のダメさはジムに行けないこととは関係ない。ルーティンを見直すべきだな。")}
          ${ex("That detective novel I read last night — the murderer's motive <strong>had nothing to do with</strong> money at all.", "昨夜読んだ探偵小説、犯人の動機は金とは全く無関係だった。")}
        `
      },
      {
        title: "似た表現・言い換え",
        icon: "🔄",
        content: `
          ${alt("be unrelated to ~", ["tag-formal"], "〜と無関係だ", "have nothing to do withよりフォーマルで書き言葉向き。感情的なニュアンスが薄い。", "His injury is <strong>unrelated to</strong> the training load last month.", "彼の怪我は先月のトレーニング負荷とは無関係だ。")}
          ${alt("have no connection to ~", ["tag-formal"], "〜と繋がりがない", "「繋がり・接点がない」という意味。組織・人物関係の説明に多い。", "The producer <strong>has no connection to</strong> that label anymore.", "そのプロデューサーはもうあのレーベルとは繋がりがない。")}
          ${alt("not related to ~", ["tag-casual"], "〜と関係ない（口語）", "もっとカジュアルで日常的。ただし have nothing to do with ほど強い切り離し感はない。", "My bad mood this morning is <strong>not related to</strong> missing the gym.", "今朝の不機嫌はジムに行けなかったこととは関係ない。")}
          ${alt("That's not my problem.", ["tag-native"], "俺には関係ない（強い拒絶）", "have nothing to do with より直接的な突き放し。面倒事を断るとき。", "He looked at the mess and said, '<strong>That's not my problem.</strong>'", "彼はそのめちゃくちゃな状況を見て「俺には関係ない」と言った。")}
        `
      },
      {
        title: "使い分けのコツ",
        icon: "💡",
        content: `
          <div class="tip-box">
            <h3>使い分けガイド</h3>
            <div class="tip-item">感情を込めて「俺には関係ない」と言いたいとき → <strong>have nothing to do with</strong></div>
            <div class="tip-item">論文・レポートで「AとBは無関係である」と書くとき → <strong>be unrelated to</strong></div>
            <div class="tip-item">会話で軽く「関係ないよ」と言うとき → <strong>not related to / not about</strong></div>
            <div class="tip-item">面倒を断るとき → <strong>That's not my problem.</strong></div>
          </div>
        `
      }
    ]
  },
  {
    id: 2,
    phrase: "have trouble doing",
    short: "〜するのに苦労する・うまくできない",
    panels: [
      {
        title: "意味・ニュアンス",
        icon: "📖",
        content: `
          <div class="nuance-box">
            <strong>「〜するのが難しい・うまくいかない」</strong>という苦労・困難のニュアンス。
            「できない」という完全な否定ではなく、<strong>「やろうとしているけどうまくいかない」</strong>というプロセスの難しさを表す。<br><br>
            <em>have trouble + 動詞ing</em> の形が基本。試験・仕事・日常生活どんな場面でも使いやすい表現。
          </div>
        `
      },
      {
        title: "よく使うパターン",
        icon: "🔧",
        content: `
          <div class="pattern-label">構文バリエーション</div>
          ${pat("I have trouble doing ~.", "〜するのに苦労している（現在）", "今まさに困っていることを話すとき")}
          ${pat("He had trouble sleeping.", "彼は眠れなかった（過去）", "過去の困難を語るとき")}
          ${pat("I'm having trouble focusing.", "集中するのが難しい（今この瞬間）", "今現在の状態を伝えるとき")}
          ${pat("Do you have trouble with ~?", "〜で苦労してない？", "相手に共感や確認するとき")}
          ${pat("have a lot of trouble / have no trouble", "かなり苦労する / 全く苦労しない", "程度を変えられる")}
        `
      },
      {
        title: "会話例・日記文",
        icon: "✍️",
        content: `
          ${ex("I <strong>had trouble waking up</strong> this morning even though I slept early. My body just won't cooperate.", "早く寝たのに今朝は起きるのに苦労した。体が言うことを聞かない。")}
          ${ex("LeBron's team seemed to <strong>have trouble defending</strong> in the fourth quarter last night.", "昨夜の試合、レブロンのチームは第4Q の守備に苦労してたな。")}
          ${ex("I always <strong>have trouble keeping up with</strong> J. Cole's lyrics — they're so dense.", "J. Coleの歌詞についていくのはいつも大変。密度が高すぎる。")}
          ${ex("The detective in that novel I'm reading <strong>had trouble trusting</strong> anyone — even his own instincts.", "読んでる小説の探偵、誰も信用できなくて苦労してた。自分の直感さえも。")}
        `
      },
      {
        title: "似た表現・言い換え",
        icon: "🔄",
        content: `

// ────── HELPERS ──────
function pat(en, ja, note) {
  const highlighted = en.replace(/~/g, '<span class="blank">___</span>');
  return `<div class="pattern-item">
    <div class="pattern-en">${highlighted}</div>
    <div class="pattern-ja">${ja}</div>
    <span class="pattern-note">💬 ${note}</span>
  </div>`;
}

function ex(en, ja) {
  return `<div class="example-item">
    <div class="example-row">
      <button class="speak-btn" onclick="speak(this)" data-text="${en.replace(/<[^>]+>/g,'').replace(/"/g,'&quot;')}">▶</button>
      <div>
        <div class="example-en">${en}</div>
        <div class="example-ja">${ja}</div>
      </div>
    </div>
  </div>`;
}

function alt(phrase, tags, meaning, diff, exEn, exJa) {
  const tagHTML = tags.map(t => {
    const labels = { 'tag-casual': '🗣️カジュアル', 'tag-formal': '💼フォーマル', 'tag-textbook': '📚教科書', 'tag-native': '🌍ネイティブ的' };
    return `<span class="tag ${t}">${labels[t]||t}</span>`;
  }).join('');
  const plainEx = exEn ? exEn.replace(/<[^>]+>/g,'').replace(/"/g,"'") : '';
  const exHTML = exEn ? `
    <div class="alt-example">
      <button class="speak-btn" onclick="speak(this)" data-text="${plainEx}">▶</button>
      <div class="alt-example-text">
        <div class="alt-example-en">${exEn}</div>
        <div class="alt-example-ja">${exJa}</div>
      </div>
    </div>` : '';
  return `<div class="alt-item">
    <div class="alt-phrase">${phrase}</div>
    <div class="tag-row">${tagHTML}</div>
    <div class="pattern-ja">${meaning}</div>
    <div class="alt-diff"><span class="pin">📌</span> ${diff}</div>
    ${exHTML}
  </div>`;
}

// ────── SPEECH ──────
let currentRate = 1.0;
let currentUtterance = null;

function setSpeed(rate, btn) {
  currentRate = rate;
  document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function speak(btn) {
  if (currentUtterance) {
    speechSynthesis.cancel();
    document.querySelectorAll('.speak-btn.playing').forEach(b => {
      b.classList.remove('playing');
      b.textContent = '▶';
    });
    if (btn.classList.contains('was-playing')) {
      btn.classList.remove('was-playing');
      return;
    }
  }

  const text = btn.getAttribute('data-text');
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'en-US';
  utter.rate = currentRate;

  const voices = speechSynthesis.getVoices();
  const samantha = voices.find(v => v.name === 'Samantha');
  const googleUS = voices.find(v => v.name === 'Google US English');
  if (samantha) utter.voice = samantha;
  else if (googleUS) utter.voice = googleUS;

  utter.onstart = () => { btn.classList.add('playing'); btn.textContent = '■'; };
  utter.onend = () => { btn.classList.remove('playing'); btn.textContent = '▶'; currentUtterance = null; };
  utter.onerror = () => { btn.classList.remove('playing'); btn.textContent = '▶'; currentUtterance = null; };

  btn.classList.add('was-playing');
  setTimeout(() => btn.classList.remove('was-playing'), 300);

  currentUtterance = utter;
  speechSynthesis.speak(utter);
}

// ────── TABS & PANELS ──────
const tabNav = document.getElementById('tabNav');
const mainEl = document.getElementById('main');

phrases.forEach((p, i) => {
  // Tab button
  const btn = document.createElement('button');
  btn.className = 'tab-btn' + (i === 0 ? ' active' : '');
  btn.innerHTML = `<span class="tab-num">${String(i+1).padStart(2,'0')}</span>${p.phrase}`;
  btn.onclick = () => switchTab(i);
  tabNav.appendChild(btn);

  // Panel
  const panel = document.createElement('div');
  panel.className = 'phrase-panel' + (i === 0 ? ' active' : '');
  panel.id = `panel-${i}`;

  let html = `
    <div class="phrase-hero">
      <h1><span class="phrase-num">Phrase ${String(i+1).padStart(2,'0')}</span>${p.phrase}</h1>
      <div class="phrase-meaning-short">${p.short}</div>
    </div>
  `;

  p.panels.forEach(sec => {
    html += `
      <div class="section-card">
        <div class="section-header">
          <span class="section-icon">${sec.icon}</span>
          <h2>${sec.title}</h2>
        </div>
        <div class="section-body">${sec.content}</div>
      </div>
    `;
  });

  panel.innerHTML = html;
  mainEl.appendChild(panel);
});

function switchTab(idx) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', i===idx));
  document.querySelectorAll('.phrase-panel').forEach((p,i) => p.classList.toggle('active', i===idx));
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Progress bar
window.addEventListener('scroll', () => {
  const d = document.documentElement;
  const progress = (d.scrollTop / (d.scrollHeight - d.clientHeight)) * 100;
  document.getElementById('progressBar').style.width = progress + '%';
});

speechSynthesis.onvoiceschanged = () => {};
